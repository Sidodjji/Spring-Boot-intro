databaseChangeLog:
  - changeSet:
      id: create-books-table
      author: Andrii
      changes:
        - createTable:
            tableName: books
            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(255)

              - column:
                  name: author
                  type: VARCHAR(255)

              - column:
                  name: isbn
                  type: VARCHAR(255)

              - column:
                  name: price
                  type: DECIMAL(19,2)

              - column:
                  name: description
                  type: VARCHAR(255)

              - column:
                  name: cover_image
                  type: VARCHAR(255)

              - column:
                  name: is_deleted
                  type: TINYINT(1)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false